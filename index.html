<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>20 Letters for My Love</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ambient-particles" id="ambientParticles"></div>

<audio id="bgMusic" loop></audio>
<button id="musicFab" class="music-fab" hidden aria-label="Toggle music">🔊</button>

<!-- 1. MUSIC CONSENT -->
<section id="screen-music" class="screen active">
  <div class="screen-inner">
    <p class="eyebrow">Before we begin</p>
    <h1 class="serif">This experience is best enjoyed with sound.</h1>
    <div class="btn-row">
      <button class="btn btn-primary" id="playWithMusicBtn">Play with Music</button>
      <button class="btn btn-ghost" id="skipMusicBtn">Continue without Music</button>
    </div>
  </div>
</section>

<!-- 2. LOADING -->
<section id="screen-loading" class="screen">
  <div class="screen-inner">
    <div class="loading-hearts" aria-hidden="true">
      <span>♡</span><span>♡</span><span>♡</span>
    </div>
    <p class="loading-text serif">Preparing your birthday surprise&hellip;</p>
  </div>
</section>

<!-- 3. WELCOME -->
<section id="screen-welcome" class="screen">
  <div class="screen-inner">
    <p class="eyebrow" id="welcomeEyebrow">Happy 20th Birthday</p>
    <h1 class="serif hero-heading" id="welcomeHeading">Happy 20th Birthday</h1>
    <div class="hero-sub" id="welcomeSub"></div>
    <p class="hero-paragraph" id="welcomeIntro"></p>
    <button class="btn btn-primary" id="beginJourneyBtn">Begin Your Journey</button>
  </div>
</section>

<!-- 4. INTRODUCTION -->
<section id="screen-intro" class="screen">
  <div class="screen-inner narrow">
    <p class="eyebrow">A note from me, first</p>
    <div id="introParagraphs" class="letter-paragraphs"></div>
    <button class="btn btn-primary" id="introContinueBtn">Continue</button>
  </div>
</section>

<!-- 5. LETTER JOURNEY -->
<section id="screen-journey" class="screen">
  <div class="progress-wrap">
    <p class="progress-label" id="progressLabel">Letter 1 of 20</p>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div id="journeyStage" class="journey-stage"></div>
</section>

<!-- 6. ENDING -->
<section id="screen-ending" class="screen">
  <div class="screen-inner">
    <div id="endingLines" class="ending-lines"></div>
    <div id="endingCollage" class="ending-collage" hidden></div>
    <button class="btn btn-primary" id="openMemoryBoxBtn" hidden>Open Your Memory Box</button>
  </div>
  <div class="confetti-layer" id="confettiLayer" aria-hidden="true"></div>
</section>

<!-- 7. MEMORY BOX -->
<section id="screen-memorybox" class="screen">
  <div class="screen-inner wide">
    <p class="eyebrow">Anytime you want to remember</p>
    <h1 class="serif">Your Memory Box</h1>
    <p class="hero-paragraph">All twenty letters, always here for you to revisit.</p>
    <div id="memoryGrid" class="memory-box-grid"></div>
  </div>
</section>

<!-- Reusable modal for memory box + video + lightbox -->
<div id="modalOverlay" class="modal-overlay" hidden>
  <button class="modal-close" id="modalCloseBtn" aria-label="Close">&times;</button>
  <div id="modalContent" class="modal-content"></div>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
